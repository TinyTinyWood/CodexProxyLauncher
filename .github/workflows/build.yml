name: Build

on:
  push:
    branches:
      - main
      - csharp
  pull_request:
    branches:
      - main

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild .\CodexProxyLauncherWin32.vcxproj /p:Configuration=Release /p:Platform=x64
